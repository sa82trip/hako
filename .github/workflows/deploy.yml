name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:   # ← hako-contents 에서 content push 시 트리거 받음

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
        # ▼▼ [추가 1] private 서브모듈(content repo) 접근용 PAT 인증
      - name: Authenticate for private submodule
        run: git config --global url."https://x-access-token:${{ secrets.CONTENT_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: Pull latest content   # ← 추가. 고정 포인터 무시하고 content 최신 커밋 사용
        run: git submodule update --init --remote --recursive
      - run: npm ci
      - run: npx quartz build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
